services:
  salesforce-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: salesforce-mcp
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - SF_TOKENS_DIR=/app/tokens
    volumes:
      - tokens:/app/tokens       # persists user OAuth tokens across restarts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  tokens:
